apiVersion: apps/v1
kind: Deployment
metadata:
  name: nanogpt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nanogpt
  template:
    metadata:
      labels:
        app: nanogpt
    spec:
      containers:
      - name: nanogpt
        image: nanogpt:latest
        ports:
        - containerPort: 8000  # FastAPI
        - containerPort: 8001  # Prometheus
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10